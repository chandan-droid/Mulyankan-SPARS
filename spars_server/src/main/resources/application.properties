spring.application.name=spars_server

# ===============================
# DATABASE CONFIG (ENV FIRST)
# ===============================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://srv674.hstgr.io:3306/u705414379_spars_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME }
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT CONFIG
# ===============================

jwt.secret=${JWT_SECRET:9f8c7e6d5b4a3a2c1d0e9f8c7e6d5b4a9f8c7e6d5b4a3a2c1d0e9f8c7e6d5b4a}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=SparsDBPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
